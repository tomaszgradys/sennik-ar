name: Codzienny wpis blogowy

# Publikuje JEDEN wpis dziennie o LOSOWEJ porze między 09:00 a 18:00 (Europe/Warsaw),
# żeby nie wyglądało to na sztywny automat. Workflow budzi się RAZ dziennie pod koniec
# okna (~18:00 lokalnie), a scripts/blog-gate.mjs przepuszcza wpis gdy należny (1 wpis/dzień).
# Ręczne odpalenie (Run workflow) publikuje od razu.
# WYMAGA sekretów repo: ANTHROPIC_API_KEY, FAL_KEY, VERCEL_TOKEN.
on:
  # HARMONOGRAM WYŁĄCZONY 2026-07-18. Autoblog zostaje tylko tam, gdzie jest realny
  # ruch: sennik.tv i sogno.pro (Actions) + profivo.pl i kalendarz.pro (Vercel Cron).
  # Ten serwis stracił ruch w kolapsie floty 14-17.07 (patrz notatka o kolapsie), a
  # każdy run zjadał minuty Actions ze WSPÓLNEJ puli konta — po jej wyczerpaniu GitHub
  # odrzucał joby CAŁEJ floty ("spending limit"), więc martwe klony zagłodziły żywe.
  # PRZYWRÓCENIE (gdy serwis odżyje): odkomentować 'schedule' poniżej — cron bez zmian.
  # Ręczne odpalenie działa dalej: Actions -> Run workflow (workflow_dispatch).
  # schedule:
  #   - cron: "0 16 * * *" # 1×/dziennie 16 UTC ≈ 18:00 lokalnie (koniec okna → brama zawsze przepuszcza); 1/dzień zamiast co godzinę oszczędza minuty GitHub Actions
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: blog-daily
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Czy publikować teraz?
        id: gate
        env:
          EVENT: ${{ github.event_name }}
        run: node scripts/blog-gate.mjs >> "$GITHUB_OUTPUT"

      - name: Instalacja zależności
        if: steps.gate.outputs.proceed == 'true'
        run: npm install --no-audit --no-fund

      - name: Wygeneruj wpis
        if: steps.gate.outputs.proceed == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: node scripts/blog.mjs generate

      # Strażnik obrazków: dopilnowuje, że KAŻDY wpis ma prawdziwy hero z fal.ai
      # (dogeneruje brakujące/placeholdery). Nie blokuje deploya, jeśli któryś się nie uda.
      - name: Dopilnuj obrazków (repair)
        if: steps.gate.outputs.proceed == 'true'
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
        run: node scripts/blog.mjs repair

      - name: Commit nowego wpisu
        id: commit
        if: steps.gate.outputs.proceed == 'true'
        run: |
          git config user.name "Hulm Bot"
          git config user.email "bot@hulm.pro"
          git add src/data/blog public/blog-img
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Brak nowego wpisu (temat AI nie powiódł się lub obrazek FLUX zawiódł)."
          else
            git commit -m "Blog: nowy wpis (auto)"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy na Vercel
        if: steps.commit.outputs.changed == 'true'
        run: npx --yes vercel@latest deploy --prod --yes --token "$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          # Bez ID projektu `vercel deploy` w CI tworzył pusty deployment (UNKNOWN/0ms)
          # i wpis nie wchodził na żywo. To jawne ID (nie sekrety) linkują projekt w CI.
          VERCEL_ORG_ID: team_EAP63Y4DIZ5Z8NbsPm7QUC8w
          VERCEL_PROJECT_ID: prj_rlKUZ9RL8Dh8hlwkqi4MAIJJvyhS
